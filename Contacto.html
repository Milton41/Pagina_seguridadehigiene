<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contactanos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#134e4a,#042f2e);
    color:white;
}

/* NAV */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2dd4bf;
}

nav{
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav a:hover{
    color:#2dd4bf;
}

/* FORMULARIO */

.contact{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.form-box{
    width:500px;
    max-width:100%;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:0.5s;
}

.form-box:hover{
    transform:scale(1.02);
}

.form-box h1{
    text-align:center;
    margin-bottom:30px;
    color:#2dd4bf;
}

.input-box{
    display:flex;
    flex-direction:column;
    margin-bottom:20px;
}

.input-box label{
    margin-bottom:8px;
}

.input-box input,
.input-box textarea{
    padding:15px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#e2e8f0;
}

.input-box textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#2dd4bf,#14b8a6);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(45,212,191,0.6);
}

footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.3);
}

</style>
</head>
<body>

<header>

    <div class="logo">CyberSafe</div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="Consejos.html">Consejos</a>
        <a href="Seguridad.html">Seguridad</a>
    </nav>

</header>

<section class="contact">

    <div class="form-box">

        <h1>Contacto</h1>

        <form>

            <div class="input-box">
                <label>Nombre</label>
                <input type="text" placeholder="Ingresá tu nombre">
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Ingresá tu email">
            </div>

            <div class="input-box">
                <label>Mensaje</label>
                <textarea placeholder="Escribí tu mensaje"></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>

        </form>

    </div>

</section>

<footer>
    © 2026 CyberSafe
</footer>

</body>
</html>
